<!doctype html>
<html>
  <head>
    <title>Buudget Tracker</title>
    <style>
      body {
        font-family: Arial;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
      }
      .income {
        color: green;
      }
      .expense {
        color: red;
      }
      input,
      select {
        padding: 8px;
        margin: 5px;
      }
      button {
        padding: 10px 20px;
        background: green;
        color: white;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>💰 Budget Tracker</h1>
    <h2>Balance: ${{ balance}}</h2>
    <form action="/add" method="POST">
      <input
        type="number"
        name="amount"
        placeholder="Amount"
        step="0.01"
        required
      />
      <input
        type="text"
        name="description"
        placeholder="Description"
        required
      />
      <select name="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <button type="submit">Add</button>
    </form>

    <h3>Transactions:</h3>
    {% for t in transactions %}
    <p class="{{t['type']}}">
      {{t['type'].upper() }}: ${{t['amount']}} - {{t['description']}}
    </p>
    {% endfor %}
  </body>
</html>
